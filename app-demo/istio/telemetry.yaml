# 메시 전체 텔레메트리: 액세스 로그 + 트레이싱(샘플링 100%)
# 주의: tracing provider "otel"은 istiod meshConfig의 extensionProviders에
#       Alloy의 OTLP 엔드포인트로 미리 등록되어 있어야 한다(Istio 설치 단계).
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: istio-system
spec:
  accessLogging:
    - providers:
        - name: envoy
  tracing:
    - providers:
        - name: otel
      randomSamplingPercentage: 100
