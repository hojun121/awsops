# Kiali (kiali/kiali-server) - 메시 서비스 그래프
# Prometheus 소스로 Mimir 사용. 트레이싱 비활성(Tempo 제거됨).
auth:
  strategy: anonymous
external_services:
  prometheus:
    url: "http://mimir.observability.svc.cluster.local:8080/prometheus"
    health_check_url: "http://mimir.observability.svc.cluster.local:8080/ready"
  tracing:
    enabled: false
  grafana:
    enabled: true
    internal_url: "http://grafana.istio-system.svc.cluster.local:80"
