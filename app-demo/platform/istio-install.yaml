# Istio 설치 설정 (istioctl install -f istio-install.yaml)
# - demo 프로파일 (istiod + ingress/egress gateway)
# - 액세스 로그: 모든 사이드카 stdout (Alloy가 수집 -> Loki)
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: awsops-demo
spec:
  profile: demo
  meshConfig:
    accessLogFile: /dev/stdout
