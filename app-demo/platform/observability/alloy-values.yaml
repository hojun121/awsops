# Grafana Alloy: 단일 Deployment로 3종 수집
#  - 메트릭: Istio Envoy 사이드카(:15020/stats/prometheus) scrape -> Mimir remote_write
#  - 로그:  bookinfo/istio-system 파드 로그 -> Loki
#  - 트레이스: OTLP 수신(4317/4318) -> Tempo  (Istio가 alloy:4317로 전송)
controller:
  type: deployment
  replicas: 1
rbac:
  create: true
service:
  enabled: true
alloy:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  configMap:
    content: |
      logging {
        level = "warn"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // ---- Metrics: Envoy sidecars -> Mimir ----
      discovery.relabel "envoy" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          regex         = "istio-proxy"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          regex         = "(.+)"
          replacement   = "$1:15020"
          target_label  = "__address__"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "envoy" {
        targets         = discovery.relabel.envoy.output
        metrics_path    = "/stats/prometheus"
        scrape_interval = "15s"
        forward_to      = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir.observability.svc.cluster.local:8080/api/v1/push"
        }
      }

      // ---- Logs: pod logs -> Loki ----
      discovery.relabel "logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "bookinfo|istio-system"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.logs.output
        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // ---- Traces: OTLP receiver -> Tempo ----
      otelcol.receiver.otlp "in" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.observability.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }
